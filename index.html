<!DOCTYPE html>
<html>
<head>
  <title>Shami Ahmad - Portfolio</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      transition:0.3s;
      background:#f2f6ff;
      text-align:center;
    }

    .dark{
      background:#121212;
      color:white;
    }

    .card{
      background:white;
      width:320px;
      margin:50px auto;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .dark .card{
      background:#1e1e1e;
      color:white;
    }

    img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
    }

    .btn{
      padding:10px 15px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-top:10px;
    }

    .btn:hover{
      background:#0056b3;
    }

    .project{
      margin-top:10px;
      padding:10px;
      background:#e9f0ff;
      border-radius:10px;
    }

    .dark .project{
      background:#2a2a2a;
    }

  </style>
</head>

<body>

  <button class="btn" onclick="toggleDark()">🌙 Dark Mode</button>

  <div class="card">

    <img src="profile.jpg">

    <h1>Shami Ahmad</h1>
    <p>Web Developer 🚀</p>

    <p><b>Skills:</b> HTML | CSS | JavaScript (learning)</p>

    <h3>Projects</h3>

    <div class="project">✔ Portfolio Website</div>
    <div class="project">✔ GitHub Pages Site</div>
    <div class="project">✔ Basic HTML Pages</div>

    <a class="btn" href="mailto:example@gmail.com">Contact Me</a>

  </div>

  <script>
    function toggleDark(){
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
